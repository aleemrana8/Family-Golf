name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ───────────────────────────────────────────
  # JOB 1: Lint & Validate
  # ───────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check src/server.js && node --check src/routes/api.js && node --check src/routes/pages.js && node --check src/db/database.js

      - name: Validate package.json
        run: npm pack --dry-run

  # ───────────────────────────────────────────
  # JOB 2: Test
  # ───────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ───────────────────────────────────────────
  # JOB 3: Build & Push Docker Image
  # ───────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────
  # JOB 4: Deploy (Smoke Test)
  # ───────────────────────────────────────────
  deploy:
    name: Deploy Verification
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server and run smoke test
        run: |
          node src/server.js &
          SERVER_PID=$!
          sleep 3

          echo "── Smoke Testing All Routes ──"
          for route in "/" "/lessons" "/adventure" "/book" "/contact" "/api/reviews"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000$route)
            if [ "$STATUS" = "200" ]; then
              echo "✅ GET $route -> $STATUS"
            else
              echo "❌ GET $route -> $STATUS"
              kill $SERVER_PID
              exit 1
            fi
          done

          echo "── Smoke Testing API POST ──"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/newsletter \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.com"}')
          if [ "$STATUS" = "200" ]; then
            echo "✅ POST /api/newsletter -> $STATUS"
          else
            echo "❌ POST /api/newsletter -> $STATUS"
            kill $SERVER_PID
            exit 1
          fi

          echo ""
          echo "All smoke tests passed!"
          kill $SERVER_PID
